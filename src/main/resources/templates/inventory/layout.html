<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - 재고관리 시스템'">재고관리 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 250px;
            --color-primary: #4f6df5;
            --color-primary-dark: #3d57d5;
            --color-sidebar: #1e293b;
            --color-sidebar-hover: #334155;
            --color-bg: #f1f5f9;
            --color-card: #ffffff;
            --color-border: #e2e8f0;
            --color-text: #334155;
            --color-text-muted: #94a3b8;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 8px;
        }
        * {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            min-height: 100vh;
            background-color: var(--color-bg);
            color: var(--color-text);
            font-size: 0.9rem;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background: var(--color-sidebar);
            padding-top: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        .sidebar-brand {
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            letter-spacing: -0.02em;
        }
        .sidebar-brand i {
            margin-right: 10px;
            opacity: 0.9;
        }
        .sidebar-menu {
            list-style: none;
            padding: 12px 8px;
            margin: 0;
            flex: 1;
        }
        .sidebar-menu li a {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: all 0.15s ease;
            border-radius: 6px;
            margin-bottom: 2px;
            font-size: 0.88rem;
        }
        .sidebar-menu li a:hover {
            background-color: var(--color-sidebar-hover);
            color: rgba(255,255,255,0.95);
        }
        .sidebar-menu li a.active {
            background-color: var(--color-primary);
            color: white;
            font-weight: 500;
        }
        .sidebar-menu li a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
            font-size: 1rem;
        }

        /* Main content */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 24px;
        }
        .top-bar {
            background: var(--color-card);
            padding: 16px 24px;
            margin: -24px -24px 24px -24px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar .page-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--color-text);
            margin: 0;
            letter-spacing: -0.02em;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Cards */
        .card {
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
            border-radius: var(--radius);
        }
        .card-header {
            background: var(--color-card);
            border-bottom: 1px solid var(--color-border);
            font-weight: 600;
            padding: 12px 16px;
            font-size: 0.88rem;
        }

        /* Tables */
        .table {
            margin-bottom: 0;
            font-size: 0.85rem;
        }
        .table > thead > tr > th {
            background-color: #f8fafc;
            font-weight: 600;
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            border-bottom: 2px solid var(--color-border);
            padding: 10px 12px;
            white-space: nowrap;
        }
        .table > tbody > tr > td {
            padding: 10px 12px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
        }
        .table > tbody > tr:hover > td {
            background-color: #f8fafc;
        }
        .table > tbody > tr:last-child > td {
            border-bottom: none;
        }

        /* Buttons */
        .btn {
            font-size: 0.85rem;
            border-radius: 6px;
            font-weight: 500;
        }
        .btn-primary {
            background: var(--color-primary);
            border: none;
        }
        .btn-primary:hover {
            background: var(--color-primary-dark);
        }
        .btn-sm {
            font-size: 0.78rem;
            padding: 4px 8px;
        }

        /* Forms */
        .form-control, .form-select {
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(79,109,245,0.1);
        }
        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 4px;
        }

        /* Badges */
        .badge {
            font-weight: 500;
            font-size: 0.73rem;
            padding: 3px 7px;
            border-radius: 4px;
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .month-selector select {
            width: auto;
        }

        /* Mobile */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--color-text);
            cursor: pointer;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }

        @media (max-width: 991.98px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .sidebar-overlay.show {
                display: block;
            }
            .main-content {
                margin-left: 0;
            }
            .mobile-menu-btn {
                display: block;
            }
            .top-bar {
                flex-wrap: wrap;
                gap: 10px;
            }
            .top-bar .page-title {
                font-size: 1.05rem;
            }
        }

        @media (max-width: 575.98px) {
            .main-content {
                padding: 12px;
            }
            .top-bar {
                margin: -12px -12px 16px -12px;
                padding: 12px 16px;
            }
            .card-body {
                padding: 0.75rem;
            }
            .table {
                font-size: 0.8rem;
            }
            .btn {
                padding: 0.35rem 0.6rem;
                font-size: 0.8rem;
            }
            .btn-sm {
                padding: 3px 6px;
                font-size: 0.72rem;
            }
            .form-control, .form-select {
                font-size: 0.85rem;
            }
        }

        /* Table scroll */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .table-responsive::-webkit-scrollbar {
            height: 6px;
        }
        .table-responsive::-webkit-scrollbar-track {
            background: transparent;
        }
        .table-responsive::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .table-responsive::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .table-responsive table {
            min-width: 800px;
        }

        @media (max-width: 991.98px) {
            .table-responsive {
                position: relative;
                margin-bottom: 25px;
            }
            .table-responsive::after {
                content: '\2190 \2192 스크롤';
                position: absolute;
                bottom: -18px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 0.7rem;
                color: var(--color-text-muted);
                background: var(--color-bg);
                padding: 2px 10px;
                border-radius: 10px;
            }
        }

        /* Pagination */
        .pagination .page-link {
            font-size: 0.82rem;
            border-radius: 6px;
            margin: 0 2px;
            border: 1px solid var(--color-border);
            color: var(--color-text);
        }
        .pagination .page-item.active .page-link {
            background: var(--color-primary);
            border-color: var(--color-primary);
        }
    </style>
</head>
<body>
    <th:block th:fragment="sidebar">
    <!-- 모바일 오버레이 -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <nav class="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-box-seam"></i>
            재고관리 시스템
        </div>
        <ul class="sidebar-menu">
            <li>
                <a th:href="@{/inventory/stocks}" th:classappend="${menu == 'stocks'} ? 'active' : ''">
                    <i class="bi bi-graph-up"></i>
                    재고 현황
                </a>
            </li>
            <li>
                <a th:href="@{/inventory/products}" th:classappend="${menu == 'products'} ? 'active' : ''">
                    <i class="bi bi-box"></i>
                    제품 관리
                </a>
            </li>
            <li>
                <a th:href="@{/inventory/orders}" th:classappend="${menu == 'orders'} ? 'active' : ''">
                    <i class="bi bi-truck"></i>
                    주문/입고 관리
                </a>
            </li>
            <li>
                <a th:href="@{/inventory/import}" th:classappend="${menu == 'import'} ? 'active' : ''">
                    <i class="bi bi-file-earmark-excel"></i>
                    엑셀 Import
                </a>
            </li>
            <!-- 관리자 전용 메뉴 -->
            <li sec:authorize="hasRole('ADMIN')" style="margin-top: 20px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);">
                <a th:href="@{/inventory/users}" th:classappend="${menu == 'users'} ? 'active' : ''">
                    <i class="bi bi-people"></i>
                    회원 관리
                </a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/inventory/logs}" th:classappend="${menu == 'logs'} ? 'active' : ''">
                    <i class="bi bi-journal-text"></i>
                    활동 로그
                </a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/inventory/admin}" th:classappend="${menu == 'admin'} ? 'active' : ''">
                    <i class="bi bi-gear"></i>
                    시스템 관리
                </a>
            </li>
        </ul>
        <div style="position: absolute; bottom: 20px; width: 100%; padding: 0 20px;">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light w-100">
                    <i class="bi bi-box-arrow-left me-2"></i>로그아웃
                </button>
            </form>
        </div>
    </nav>

    <!-- 모바일 메뉴 스크립트 -->
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('show');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }

        // 페이지 로드 시 모바일 메뉴 버튼 추가
        document.addEventListener('DOMContentLoaded', function() {
            const topBar = document.querySelector('.top-bar');
            if (topBar && !topBar.querySelector('.mobile-menu-btn')) {
                const pageTitle = topBar.querySelector('.page-title');
                if (pageTitle) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'd-flex align-items-center gap-2';

                    const menuBtn = document.createElement('button');
                    menuBtn.className = 'mobile-menu-btn';
                    menuBtn.innerHTML = '<i class="bi bi-list"></i>';
                    menuBtn.onclick = toggleSidebar;

                    pageTitle.parentNode.insertBefore(wrapper, pageTitle);
                    wrapper.appendChild(menuBtn);
                    wrapper.appendChild(pageTitle);
                }
            }

            // 사이드바 메뉴 클릭 시 모바일에서 자동 닫기
            document.querySelectorAll('.sidebar-menu a').forEach(link => {
                link.addEventListener('click', function() {
                    if (window.innerWidth < 992) {
                        toggleSidebar();
                    }
                });
            });

            // 화면 크기 변경 시 사이드바 상태 초기화
            window.addEventListener('resize', function() {
                if (window.innerWidth >= 992) {
                    document.querySelector('.sidebar').classList.remove('show');
                    document.querySelector('.sidebar-overlay').classList.remove('show');
                }
            });
        });
    </script>
    </th:block>

    <div class="main-content" th:fragment="content">
        <!-- Page content goes here -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        // 모바일 사이드바 토글
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('show');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }

        // 페이지 로드 시 모바일 메뉴 버튼 추가
        document.addEventListener('DOMContentLoaded', function() {
            const topBar = document.querySelector('.top-bar');
            if (topBar) {
                const pageTitle = topBar.querySelector('.page-title');
                if (pageTitle) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'd-flex align-items-center gap-2';

                    const menuBtn = document.createElement('button');
                    menuBtn.className = 'mobile-menu-btn';
                    menuBtn.innerHTML = '<i class="bi bi-list"></i>';
                    menuBtn.onclick = toggleSidebar;

                    pageTitle.parentNode.insertBefore(wrapper, pageTitle);
                    wrapper.appendChild(menuBtn);
                    wrapper.appendChild(pageTitle);
                }
            }

            // 사이드바 메뉴 클릭 시 모바일에서 자동 닫기
            document.querySelectorAll('.sidebar-menu a').forEach(link => {
                link.addEventListener('click', function() {
                    if (window.innerWidth < 992) {
                        toggleSidebar();
                    }
                });
            });
        });

        // 화면 크기 변경 시 사이드바 상태 초기화
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                document.querySelector('.sidebar').classList.remove('show');
                document.querySelector('.sidebar-overlay').classList.remove('show');
            }
        });
    </script>
</body>
</html>
